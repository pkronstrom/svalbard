# Capability pack: science learning and reference across the major disciplines.
# Include: core science textbooks, science Q&A, and broad educational references.
# Exclude: clinical medicine, regional field guides, and unrelated practical how-to.
# Overlap with other packs is acceptable when needed for standalone usefulness.
name: sciences
kind: pack
display_group: Science & Education
description: Biology, chemistry, physics, math, and earth sciences references
target_size_gb: 16
sources:
# ── Stack Exchange Q&A (already in default-256+ but included for standalone use) ──
- stackexchange-physics
- stackexchange-math
- stackexchange-chemistry
- stackexchange-biology

# ── Open textbook library (Kiwix LibreTexts) ──
- libretexts-biology
- libretexts-chemistry
- libretexts-geosciences
- libretexts-math
- libretexts-physics
- libretexts-statistics

