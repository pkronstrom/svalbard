# Capability pack: tiny universal additions that almost every drive can justify.
# Include: compact civilization references and other small, high-value extras.
# Exclude: heavyweight domain content, broad tools, and regional material.
# Overlap with other packs is acceptable when needed for standalone usefulness.
name: core
kind: pack
display_group: Core
description: Universal foundation — tiny references included on every drive
target_size_gb: 1
sources:
# ── Civilization references (tiny, high value) ──
- wikiciv
- permacomputing

# Note: core reference content (Wikipedia, WikiMed, survival basics, tools)
# lives in the default preset chain, not in this pack. This pack is for
# small universal additions that don't fit other domain packs.

