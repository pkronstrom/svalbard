id: payloads-all-the-things
type: zim
display_group: reference
tags:
- cybersec
depth: comprehensive
size_gb: 0.05
description: Curated web attack payloads, bypass techniques, and methodology
strategy: build
build:
  source_url: https://swisskyrepo.github.io/PayloadsAllTheThings/
  steps:
    - exec: zimit
      args: ["--url", "{source_url}", "--output", "/vault/zim/{id}.zim", "--name", "{id}"]
      docker_image: openzim/zimit
    - verify: "{output}"
      min_size: 10240
