id: payloads-all-the-things
type: zim
display_group: reference
tags:
- cybersec
depth: comprehensive
size_gb: 0.05
description: Curated web attack payloads, bypass techniques, and methodology
strategy: build
build:
  source_url: https://swisskyrepo.github.io/PayloadsAllTheThings/
  steps:
    - exec: wget
      args: ["--mirror", "--warc-file={workdir}/{id}", "--warc-cdx",
             "--page-requisites", "--adjust-extension", "--convert-links",
             "--no-parent", "--tries=3", "--timeout=30",
             "--reject", "*.mp4,*.webm",
             "-P", "{workdir}/site",
             "{source_url}"]
    - exec: warc2zim
      args: ["--output", "{output}", "--name", "{id}",
             "--title", "PayloadsAllTheThings",
             "--description", "Web attack payloads and bypass techniques",
             "{workdir}/{id}.warc.gz"]
    - verify: "{output}"
      min_size: 10240
license:
  id: MIT
  attribution: Swissky (PayloadsAllTheThings)
