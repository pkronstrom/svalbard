id: hacktricks
type: zim
display_group: reference
tags:
- cybersec
depth: comprehensive
size_gb: 0.2
description: HackTricks pentest methodology and cheat sheets
strategy: build
build:
  source_url: https://book.hacktricks.wiki
  steps:
    - exec: zimit
      args: ["--url", "{source_url}", "--output", "/vault/zim/{id}.zim", "--name", "{id}"]
      docker_image: openzim/zimit
    - verify: "{output}"
      min_size: 1048576
