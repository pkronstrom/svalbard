# Capability pack: foundational drive tooling for search, serving, inspection, and ops.
# Include: core binaries and small apps needed to use Svalbard content effectively.
# Exclude: domain reference content and hardware-specific toolchains.
# Overlap with other packs is acceptable when needed for standalone usefulness.
name: tools-base
kind: pack
display_group: Tools
description: Core drive tooling — search, file serving, encryption, compression
target_size_gb: 1
sources:
- kiwix-serve
- sqlite3
- nomic-embed-text-v1.5
- cyberchef
- sqliteviz
- duckdb-wasm
- age
- 7z
- fzf
- toybox
- dufs
- uv
- svalbard-python
- all-minilm-l6-v2
- go-pmtiles
- zstd
