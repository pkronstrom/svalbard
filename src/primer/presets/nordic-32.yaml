name: nordic-32
description: Survival essentials — fits on a 32GB USB stick
target_size_gb: 32
region: nordic

sources:
  - id: wikipedia-en-nopic
    type: zim
    tags: [general-reference, medicine, agriculture, electronics, mechanical, chemistry, physics, biology, history]
    depth: comprehensive
    size_gb: 25.0
    url_pattern: "https://download.kiwix.org/zim/wikipedia/wikipedia_en_all_nopic_{date}.zim"
    description: English Wikipedia without pictures

  - id: wikimed
    type: zim
    tags: [medicine, emergency-medicine, first-aid, pharmacy]
    depth: comprehensive
    size_gb: 2.0
    url_pattern: "https://download.kiwix.org/zim/other/mdwiki_en_all_{date}.zim"
    description: WikiMed medical encyclopedia

  - id: practical-action
    type: zim
    tags: [water, energy-power, agriculture, civil-construction]
    depth: comprehensive
    size_gb: 1.0
    url_pattern: "https://download.kiwix.org/zim/other/practical_action_en_all_{date}.zim"
    description: Practical Action appropriate technology guides

  - id: stackexchange-survival
    type: zim
    tags: [water, fire-shelter, food-foraging, navigation, first-aid, self-defense]
    depth: comprehensive
    size_gb: 0.5
    url_pattern: "https://download.kiwix.org/zim/stack_exchange/outdoors.stackexchange.com_en_all_{date}.zim"
    description: Outdoors & Survival Stack Exchange

  - id: cyberchef
    type: app
    tags: [computing]
    depth: reference-only
    size_gb: 0.015
    url: "https://github.com/gchq/CyberChef/releases/latest/download/CyberChef.zip"
    description: CyberChef web-based data analysis tool

  - id: kiwix-serve-binaries
    type: binary
    tags: [general-reference]
    depth: reference-only
    size_gb: 0.05
    url: "https://download.kiwix.org/release/kiwix-tools/kiwix-tools_linux-x86_64.tar.gz"
    description: Kiwix server binaries for serving ZIM files
