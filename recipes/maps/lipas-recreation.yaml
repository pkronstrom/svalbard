id: lipas-recreation
family: vector-service
description: >
  Finnish outdoor recreation infrastructure from LIPAS (University of Jyvaskyla).
  Lean-to shelters, huts, campfire sites, hiking trails, nature trails, canoe routes.
  This is the openly-licensed subset of what Retkikartta.fi shows.

source:
  type: wfs
  url: https://lipas.fi/geoserver/lipas/ows
  layers:
    - name: lipas:lipas_kaikki_pisteet
      label: Recreation points
      filter: "tyyppikoodi IN (301,302,206,204,202,203,205)"
      # 301=lean-to/goahti, 302=hut, 206=campfire, 204=nature tower,
      # 202=camping, 203=rest area, 205=info point
    - name: lipas:lipas_kaikki_reitit
      label: Recreation routes
      filter: "tyyppikoodi IN (4405,4404,4403,4451,4452)"
      # 4405=hiking trail, 4404=nature trail, 4403=walking route,
      # 4451=canoe route, 4452=water route
    - name: lipas:lipas_kaikki_alueet
      label: Recreation areas
  output_format: application/json
  srs: EPSG:4326

normalize:
  canonical_format: gpkg
  layer_name: lipas_recreation

package:
  map: true
  raw: true

viewer:
  name: Outdoor Recreation (LIPAS)
  name_fi: Ulkoilukohteet (LIPAS)
  category: shelter
  icon: shelter
  style:
    points:
      circle-color: "#e67e22"
      circle-radius: 6
    lines:
      line-color: "#c0392b"
      line-width: 2
    polygons:
      fill-color: "#27ae60"
      fill-opacity: 0.15

license:
  id: CC-BY-4.0
  attribution: "Jyvaskylan yliopisto, Lipas Liikuntapaikat.fi"
  url: https://lipas.fi
