id: kasviatlas
type: sqlite
group: maps
tags: [food, botany]
depth: comprehensive
size_gb: 0.1
description: Finnish vascular plant distribution atlas — species per 10km grid (LUOMUS)
strategy: build

# DEFERRED: requires free API token from laji.fi (POST /api-user with email).
# Not included in any preset until token-based auth is supported in build config.

build:
  family: reference-static
  # Best path: FinBIF REST API aggregate endpoint for 10km grid species counts.
  # This recreates the Kasviatlas grid format as a searchable SQLite database.
  #
  # Aggregate endpoint (species counts per 10km YKJ grid square):
  #   GET https://api.laji.fi/v0/warehouse/query/unit/aggregate
  #     ?aggregateBy=gathering.conversions.ykj10kmCenter.lat,gathering.conversions.ykj10kmCenter.lon
  #     &informalTaxonGroupId=MVL.343  (vascular plants)
  #     &countryId=ML.206              (Finland)
  #     &access_token=TOKEN
  #
  # Alternative: OGC API Features at https://ogcapi.laji.fi/ (GeoJSON/CSV,
  # bbox filtering, weekly updates, also CC-BY-4.0). Better for raw occurrence
  # points but less useful for atlas-style grid summaries.
  #
  # kasviatlas.fi itself has no WFS — only SVG map rendering APIs.
  # Underlying data (Kastikka DB, 8.1M observations) flows into FinBIF.
  # Taxon IDs (e.g. MX.37721) are shared between kasviatlas.fi and laji.fi.
  source_url: https://api.laji.fi/v0/warehouse/query/unit/aggregate
  source_format: json
  tables:
    - name: grid_species
      fts: true
      fts_columns: [taxon_name, taxon_name_fi]

viewer:
  name: Plant Atlas
  name_fi: Kasviatlas
  category: food
  search: true

license:
  id: CC-BY-4.0
  attribution: "Lampinen R. & Lahti T., Kasviatlas / University of Helsinki, LUOMUS"
  url: https://laji.fi/about/845
