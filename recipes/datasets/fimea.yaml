id: fimea
family: reference-static
description: >
  Finnish pharmaceutical registry (Fimea).
  Medicine names, active ingredients, dosages, and substitution groups.
  High practical value for identifying medicines and finding alternatives
  when specific brands are unavailable.

source:
  # TODO: confirm current download URL and format
  url: https://www.fimea.fi
  format: xml
  note: >
    Fimea publishes medicine data as XML/TXT downloads.
    Verify current URL and file format.

normalize:
  canonical_format: sqlite
  tables:
    - name: medicines
      fts: true
      fts_columns: [name, active_ingredient, atc_code]

package:
  reference: true
  raw: true

viewer:
  name: Pharmaceutical Registry
  name_fi: Laakerekisteri (Fimea)
  category: medical
  search: true

license:
  id: CC-BY-4.0
  attribution: Finnish Medicines Agency (Fimea)
  url: https://fimea.fi/en/about_us/open-data
