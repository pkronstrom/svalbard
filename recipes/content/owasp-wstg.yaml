id: owasp-wstg
type: zim
display_group: reference
tags:
- cybersec
depth: comprehensive
size_gb: 0.01
description: OWASP Web Security Testing Guide
strategy: build
build:
  source_url: https://owasp.org/www-project-web-security-testing-guide/
  steps:
    - exec: zimit
      args: ["--url", "{source_url}", "--output", "/vault/zim/{id}.zim", "--name", "{id}"]
      docker_image: openzim/zimit
    - verify: "{output}"
      min_size: 10240
