id: hacktricks
type: zim
display_group: reference
tags:
- cybersec
depth: comprehensive
size_gb: 0.2
description: HackTricks pentest methodology and cheat sheets
strategy: build
build:
  source_url: https://book.hacktricks.wiki
  steps:
    - exec: wget
      args: ["--mirror", "--warc-file={workdir}/{id}", "--warc-cdx",
             "--page-requisites", "--adjust-extension", "--convert-links",
             "--no-parent", "--tries=3", "--timeout=30",
             "--reject", "*.mp4,*.webm",
             "-P", "{workdir}/site",
             "{source_url}"]
    - exec: warc2zim
      args: ["--output", "{output}", "--name", "{id}",
             "--title", "HackTricks",
             "--description", "Pentest methodology and cheat sheets",
             "{workdir}/{id}.warc.gz"]
    - verify: "{output}"
      min_size: 10240
license:
  id: CC-BY-NC-4.0
  attribution: Carlos Polop (HackTricks)
  noncommercial: true
