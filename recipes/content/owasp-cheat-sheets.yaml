id: owasp-cheat-sheets
type: zim
display_group: reference
tags:
- cybersec
depth: comprehensive
size_gb: 0.005
description: OWASP Cheat Sheet Series — developer security quick references
strategy: build
build:
  source_url: https://cheatsheetseries.owasp.org
  steps:
    - exec: wget
      args: ["--mirror", "--warc-file={workdir}/{id}", "--warc-cdx",
             "--page-requisites", "--adjust-extension", "--convert-links",
             "--no-parent", "--tries=3", "--timeout=30",
             "--reject", "*.mp4,*.webm",
             "-P", "{workdir}/site",
             "{source_url}"]
    - exec: warc2zim
      args: ["--output", "{output}", "--name", "{id}",
             "--title", "OWASP Cheat Sheets",
             "--description", "Developer security quick references",
             "{workdir}/{id}.warc.gz"]
    - verify: "{output}"
      min_size: 10240
license:
  id: CC-BY-SA-4.0
  attribution: OWASP Foundation
