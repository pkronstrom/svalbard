id: owasp-cheat-sheets
type: zim
display_group: reference
tags:
- cybersec
depth: comprehensive
size_gb: 0.005
description: OWASP Cheat Sheet Series — developer security quick references
strategy: build
build:
  source_url: https://cheatsheetseries.owasp.org
  steps:
    - exec: zimit
      args: ["--url", "{source_url}", "--output", "/vault/zim/{id}.zim", "--name", "{id}"]
      docker_image: openzim/zimit
    - verify: "{output}"
      min_size: 10240
license:
  id: CC-BY-SA-4.0
  attribution: OWASP Foundation
