id: lolbas
type: zim
display_group: reference
tags:
- cybersec
depth: comprehensive
size_gb: 0.005
description: LOLBAS — Windows living-off-the-land binaries, scripts, and libraries
strategy: build
build:
  source_url: https://lolbas-project.github.io
  steps:
    - exec: zimit
      args: ["--url", "{source_url}", "--output", "/vault/zim/{id}.zim", "--name", "{id}"]
      docker_image: openzim/zimit
    - verify: "{output}"
      min_size: 10240
license:
  id: GPL-3.0-only
  attribution: LOLBAS Project contributors
