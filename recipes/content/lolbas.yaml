id: lolbas
type: zim
display_group: reference
tags:
- cybersec
depth: comprehensive
size_gb: 0.005
description: LOLBAS — Windows living-off-the-land binaries, scripts, and libraries
strategy: build
build:
  source_url: https://lolbas-project.github.io
  steps:
    - exec: wget
      args: ["--mirror", "--warc-file={workdir}/{id}", "--warc-cdx",
             "--page-requisites", "--adjust-extension", "--convert-links",
             "--no-parent", "--tries=3", "--timeout=30",
             "--reject", "*.mp4,*.webm",
             "-P", "{workdir}/site",
             "{source_url}"]
    - exec: warc2zim
      args: ["--output", "{output}", "--name", "{id}",
             "--title", "LOLBAS",
             "--description", "Windows living-off-the-land binaries and scripts",
             "{workdir}/{id}.warc.gz"]
    - verify: "{output}"
      min_size: 10240
license:
  id: GPL-3.0-only
  attribution: LOLBAS Project contributors
